<style>
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: transparent;
  z-index: 99;
  transition: transform 0.3s ease;
}
.top-nav.nav-hidden {
  transform: translateY(-100%);
}
.top-nav-inner {
  max-width: 572px;
  margin: 0 0 0 auto;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 40px;
  background: #ffffff;
  box-shadow: 0 1px 0 rgba(26,26,31,0.06);
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50px 100%);
}
.top-nav-links {
  display: flex;
  align-items: center;
}
.top-nav-links a {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-decoration: none;
  padding: 0 28px;
  line-height: 56px;
  transition: opacity 0.2s;
}
.top-nav-links a .grad {
  background: linear-gradient(135deg, #6b3fa0, #2d6ecf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-nav-links a:hover {
  opacity: 1;
}
.top-nav-links a:hover .grad {
  -webkit-text-fill-color: #1a1a1f;
}
.top-nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 8px 4px;
  align-items: center;
}
.top-nav-hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  border-radius: 1px;
  background: linear-gradient(90deg, #6b3fa0, #2d6ecf);
}
.nav-mobile-drawer {
  position: fixed;
  top: 0; right: 0;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 40%, #1a0a2e 70%, #2a1560 100%);
  z-index: 400;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  padding: 28px 32px 36px;
  box-sizing: border-box;
}
.nav-mobile-drawer.open {
  transform: translateX(0);
}
.nav-mobile-drawer-close {
  align-self: flex-end;
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  transition: color 0.15s;
}
.nav-mobile-drawer-close:hover { color: #fff; }
.nav-mobile-drawer-links {
  flex: 1;
  display: flex;
  flex-direction: column;
  margin-top: 48px;
}
.nav-mobile-drawer-links a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0;
  border-bottom: 0.5px solid rgba(255,255,255,0.1);
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
  -webkit-text-fill-color: rgba(255,255,255,0.9);
  text-decoration: none;
  background: none;
  -webkit-background-clip: unset;
  background-clip: unset;
  transition: color 0.15s;
}
.nav-mobile-drawer-links a:hover {
  color: rgba(255,255,255,0.95);
  -webkit-text-fill-color: rgba(255,255,255,0.95);
}
.nav-mobile-drawer-links a:first-child {
  border-top: 0.5px solid rgba(255,255,255,0.1);
}
.nav-drawer-home {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.5);
  -webkit-text-fill-color: rgba(255,255,255,0.5);
  transition: color 0.15s;
}
.nav-drawer-home:hover {
  color: rgba(255,255,255,0.9);
  -webkit-text-fill-color: rgba(255,255,255,0.9);
}
.top-nav-links .nav-word { position: relative; }
.nav-active .nav-word::after {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: -4px;
  height: 1.3px;
  width: 100%;
  background: linear-gradient(135deg, #6b3fa0, #2d6ecf);
  animation: navUnderline 0.6s cubic-bezier(0.34, 1.9, 0.4, 1) both;
}
@keyframes navUnderline {
  from { width: 0; }
  to { width: 100%; }
}
@media (max-width: 768px) {
  .top-nav-links { display: none; }
  .top-nav-hamburger { display: flex; }
  .top-nav { clip-path: none; }
  .top-nav-inner {
    background: transparent;
    box-shadow: none;
    clip-path: none;
  }
  .case-studies-tab { display: none; }
}
</style>

<nav class="top-nav" id="topNav">
  <div class="top-nav-inner">
    <div class="top-nav-links">
      <a href="index.html" data-drawer-trigger onclick="if(typeof openDrawer==='function'){event.preventDefault();openDrawer();}"><span class="grad">[ </span><span class="nav-word"><span class="grad">Work</span></span><span class="grad"> ]</span></a>
      <a href="lab.html"><span class="grad">[ </span><span class="nav-word"><span class="grad">Lab</span></span><span class="grad"> ]</span></a>
      <a href="info.html"><span class="grad">[ </span><span class="nav-word"><span class="grad">Info</span></span><span class="grad"> ]</span></a>
    </div>
    <button class="top-nav-hamburger" id="topNavHamburger" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<div class="nav-mobile-drawer" id="navMobileDrawer">
  <button class="nav-mobile-drawer-close" id="navMobileDrawerClose" aria-label="Close menu">✕</button>
  <nav class="nav-mobile-drawer-links">
    <a href="index.html" onclick="if(typeof openDrawer==='function'){event.preventDefault();var d=document.getElementById('navMobileDrawer');d.classList.remove('open');document.body.style.overflow='';openDrawer();}">Case Studies <span style="font-size: 28px; color: rgba(255,255,255,0.7); -webkit-text-fill-color: rgba(255,255,255,0.7);">&#8250;</span></a>
    <a href="lab.html">Lab <span style="font-size: 28px; color: rgba(255,255,255,0.7); -webkit-text-fill-color: rgba(255,255,255,0.7);">&#8250;</span></a>
    <a href="info.html">Info <span style="font-size: 28px; color: rgba(255,255,255,0.7); -webkit-text-fill-color: rgba(255,255,255,0.7);">&#8250;</span></a>
  </nav>
  <a href="index.html" class="nav-drawer-home">
    <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pyramidGradDrawer" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#9b6dd1"/>
          <stop offset="55%" stop-color="#7a54b8"/>
          <stop offset="100%" stop-color="#5c9fe8"/>
        </linearGradient>
      </defs>
      <line x1="21" y1="3"  x2="5"  y2="37" stroke="url(#pyramidGradDrawer)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="21" y1="3"  x2="34" y2="35" stroke="url(#pyramidGradDrawer)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="5"  y1="37" x2="34" y2="35" stroke="url(#pyramidGradDrawer)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="21" y1="3"  x2="23" y2="22" stroke="url(#pyramidGradDrawer)" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="34" y1="35" x2="23" y2="22" stroke="url(#pyramidGradDrawer)" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="5"  y1="37" x2="23" y2="22" stroke="url(#pyramidGradDrawer)" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span>jeremymagean.com</span>
  </a>
</div>

<script>
(function() {
  setTimeout(function() {
    var nav = document.getElementById('topNav') || document.querySelector('.top-nav');
    var hamburger = document.getElementById('topNavHamburger');
    var drawer = document.getElementById('navMobileDrawer');
    var drawerClose = document.getElementById('navMobileDrawerClose');
    if (!nav || !hamburger || !drawer || !drawerClose) return;

    function normPath(p) {
      p = p.split('?')[0].split('#')[0];
      if (p.charAt(p.length - 1) === '/') p += 'index.html';
      return p;
    }
    var here = normPath(window.location.pathname);
    document.querySelectorAll('.top-nav-links a').forEach(function(a) {
      if (a.hasAttribute('data-drawer-trigger')) return;
      if (normPath(new URL(a.href).pathname) === here) a.classList.add('nav-active');
    });

    var lastY = 0;
    function handleScroll() {
      var y = window.scrollY || window.pageYOffset || document.body.scrollTop || 0;
      if (y > lastY && y > 56) { nav.classList.add('nav-hidden'); }
      else { nav.classList.remove('nav-hidden'); }
      lastY = y < 0 ? 0 : y;
    }
    window.addEventListener('scroll', handleScroll, { passive: true });
    document.addEventListener('scroll', handleScroll, { passive: true });
    document.body.addEventListener('scroll', handleScroll, { passive: true });

    hamburger.addEventListener('click', function() {
      drawer.classList.add('open');
      document.body.style.overflow = 'hidden';
    });

    drawerClose.addEventListener('click', function() {
      drawer.classList.remove('open');
      document.body.style.overflow = '';
    });
  }, 0);
})();
</script>
