<style>
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: transparent;
  z-index: 99;
  transition: transform 0.3s ease;
}
.top-nav.nav-hidden {
  transform: translateY(-100%);
}
.top-nav-inner {
  max-width: 630px;
  margin: 0 0 0 auto;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 40px;
  background: #ffffff;
  box-shadow: 0 1px 0 rgba(26,26,31,0.06);
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50px 100%);
}
.top-nav-links {
  display: flex;
  align-items: center;
}
.top-nav-links a {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-decoration: none;
  padding: 0 28px;
  line-height: 56px;
  background: linear-gradient(135deg, #6b3fa0, #2d6ecf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: opacity 0.2s;
}
.top-nav-links a:hover {
  opacity: 1;
  -webkit-text-fill-color: #1a1a1f;
}
.top-nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 8px 4px;
  align-items: center;
}
.top-nav-hamburger span {
  display: block;
  width: 18px;
  height: 1px;
  background: #1a1a1f;
}
.nav-mobile-drawer {
  position: fixed;
  top: 0; right: 0;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(135deg, #6b3fa0 0%, #2d6ecf 55%, #1a9e82 100%);
  z-index: 400;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  padding: 28px 32px 36px;
  box-sizing: border-box;
}
.nav-mobile-drawer.open {
  transform: translateX(0);
}
.nav-mobile-drawer-close {
  align-self: flex-end;
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  transition: color 0.15s;
}
.nav-mobile-drawer-close:hover { color: #fff; }
.nav-mobile-drawer-links {
  flex: 1;
  display: flex;
  flex-direction: column;
  margin-top: 48px;
}
.nav-mobile-drawer-links a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0;
  border-bottom: 0.5px solid rgba(255,255,255,0.1);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  -webkit-text-fill-color: rgba(255,255,255,0.6);
  text-decoration: none;
  background: none;
  -webkit-background-clip: unset;
  background-clip: unset;
  transition: color 0.15s;
}
.nav-mobile-drawer-links a:hover {
  color: rgba(255,255,255,0.95);
  -webkit-text-fill-color: rgba(255,255,255,0.95);
}
.nav-mobile-drawer-links a:first-child {
  border-top: 0.5px solid rgba(255,255,255,0.1);
}
.nav-mobile-drawer-footer {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.3);
}
@media (max-width: 768px) {
  .top-nav-links { display: none; }
  .top-nav-hamburger { display: flex; }
  .top-nav { clip-path: none; }
  .top-nav-inner {
    background: transparent;
    box-shadow: none;
    clip-path: none;
  }
  .case-studies-tab { display: none; }
}
</style>

<nav class="top-nav" id="topNav">
  <div class="top-nav-inner">
    <div class="top-nav-links">
      <a href="thoughts.html">[ Thoughts ]</a>
      <a href="lab.html">[ Lab ]</a>
      <a href="info.html">[ Info ]</a>
    </div>
    <button class="top-nav-hamburger" id="topNavHamburger" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<div class="nav-mobile-drawer" id="navMobileDrawer">
  <button class="nav-mobile-drawer-close" id="navMobileDrawerClose" aria-label="Close menu">✕</button>
  <nav class="nav-mobile-drawer-links">
    <a href="index.html" onclick="if(typeof openDrawer==='function'){event.preventDefault();var d=document.getElementById('navMobileDrawer');d.classList.remove('open');document.body.style.overflow='';openDrawer();}">Case Studies <span>→</span></a>
    <a href="thoughts.html">Thoughts <span>→</span></a>
    <a href="lab.html">Lab <span>→</span></a>
    <a href="info.html">Info <span>→</span></a>
  </nav>
  <div class="nav-mobile-drawer-footer">jeremymagean.com</div>
</div>

<script>
(function() {
  setTimeout(function() {
    var nav = document.getElementById('topNav') || document.querySelector('.top-nav');
    var hamburger = document.getElementById('topNavHamburger');
    var drawer = document.getElementById('navMobileDrawer');
    var drawerClose = document.getElementById('navMobileDrawerClose');
    if (!nav || !hamburger || !drawer || !drawerClose) return;

    var lastY = 0;
    function handleScroll() {
      var y = window.scrollY || window.pageYOffset || document.body.scrollTop || 0;
      if (y > lastY && y > 56) { nav.classList.add('nav-hidden'); }
      else { nav.classList.remove('nav-hidden'); }
      lastY = y < 0 ? 0 : y;
    }
    window.addEventListener('scroll', handleScroll, { passive: true });
    document.addEventListener('scroll', handleScroll, { passive: true });
    document.body.addEventListener('scroll', handleScroll, { passive: true });

    hamburger.addEventListener('click', function() {
      drawer.classList.add('open');
      document.body.style.overflow = 'hidden';
    });

    drawerClose.addEventListener('click', function() {
      drawer.classList.remove('open');
      document.body.style.overflow = '';
    });
  }, 0);
})();
</script>
